name: Daily Digest

on:
  schedule:
    # 10:00 AM Beijing time (UTC+8) = 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      language:
        description: 'Digest language'
        required: false
        default: 'zh'
        type: choice
        options:
          - zh
          - en
          - bilingual

jobs:
  digest:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Generate digest
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_EMAIL: ${{ secrets.DIGEST_EMAIL }}
        run: |
          LANG_FLAG="--language zh"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            LANG_FLAG="--language ${{ inputs.language }}"
          fi
          cd scripts && node daily-digest.js $LANG_FLAG

      - name: Create GitHub Issue from digest
        if: hashFiles('digest-output.md') != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TODAY=$(TZ=Asia/Shanghai date '+%Y-%m-%d')
          gh label create digest --description "Daily AI digest" --color 0e8a16 2>/dev/null || true
          gh issue create \
            --title "AI Builders Digest — $TODAY" \
            --body-file digest-output.md \
            --label "digest"
